[changelog]
header = """
# Changelog

All notable changes to this project are generated from Conventional Commits.
"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

## Release Notes
{% set release_commits = commits | filter(attribute="group", value="release notes") -%}
{% set fix_commits = commits | filter(attribute="group", value="fixes and improvements") -%}
{% for commit in release_commits %}

  * {% if commit.breaking %}[breaking] {% endif %}{{ commit.message | upper_first }}{% if commit.body %} {{ loop.index }}{% endif %}
{%- endfor %}
{% if fix_commits | length > 0 %}

  * Fixes and improvements
{% endif %}
{% if release_commits | length == 0 and fix_commits | length == 0 %}

  * No user-facing changes
{% endif %}
{% for commit in release_commits %}
{% if commit.body %}

{{ loop.index }}:

{{ commit.body | trim }}
{% endif %}
{% endfor %}
"""
trim = true
render_always = true
output = "CHANGELOG.md"

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
fail_on_unmatched_commit = false
tag_pattern = "v[0-9].*"
topo_order = false
topo_order_commits = true
sort_commits = "oldest"

commit_parsers = [
  { message = "^chore\\(release\\)", skip = true },
  { body = ".*security", group = "release notes" },
  { message = "^feat", group = "release notes" },
  { message = "^perf", group = "release notes" },
  { message = "^fix", group = "fixes and improvements" },
  { message = "^refactor", group = "fixes and improvements" },
  { message = "^build", group = "fixes and improvements" },
  { message = "^ci", group = "fixes and improvements" },
  { message = "^revert", group = "fixes and improvements" },
  { message = "^docs", group = "fixes and improvements" },
  { message = "^test", group = "fixes and improvements" },
  { message = "^chore", group = "fixes and improvements" },
]
