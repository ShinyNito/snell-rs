[package]
name = "snell-rs"
version = "0.3.6"
edition = "2024"
license = "MIT"
repository = "https://github.com/ShinyNito/snell-rs"
publish = false

[dependencies]
argon2 = "0.5.3"
bytes = "1"
clap = { version = "4.6", features = ["derive"] }
hickory-resolver = "0.26.1"
libc = "0.2"
ring = "0.17.14"
rust-ini = "0.21.1"
thiserror = "2"
tokio = { version = "1", features = [
  "io-util",
  "macros",
  "net",
  "rt-multi-thread",
  "signal",
  "sync",
  "time",
] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
winnow = "1"
zeroize = "1"

[dev-dependencies]
criterion = { version = "0.8", features = ["async_tokio"] }

[[bench]]
name = "protocol"
harness = false

[[bench]]
name = "loopback"
harness = false

[[bench]]
name = "udp_loopback"
harness = false

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
