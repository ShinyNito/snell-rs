[package]
name = "snell-rs"
version = "0.2.2"
edition = "2024"
license = "MIT"
repository = "https://github.com/ShinyNito/snell-rs"
publish = false

[dependencies]
aes-gcm = "0.10.3"
argon2 = "0.5.3"
bytes = "1"
clap = { version = "4.6", features = ["derive"] }
getrandom = { version = "0.4", features = ["std"] }
libc = "0.2"
rust-ini = "0.21.1"
thiserror = "2"
tokio = { version = "1", features = [
  "io-util",
  "macros",
  "net",
  "rt-multi-thread",
  "signal",
  "sync",
  "time",
] }
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
winnow = "1"
zeroize = "1"

[dev-dependencies]
criterion = "0.8"
